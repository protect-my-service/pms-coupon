spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/coupon
    driver-class-name: org.postgresql.Driver
    username: pms
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
